name: PRX11 Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"   # اجرای خودکار هر 6 ساعت
  workflow_dispatch:         # اجرای دستی

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install aiohttp pyyaml

      - name: Run PRX11 Collector
        run: |
          python main.py

      - name: Commit & Push Output
        run: |
          git config user.name "PRX11 Bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/ || true
          git commit -m "Auto Update: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push || echo "No push"
