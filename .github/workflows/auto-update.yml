name: 🚀 Auto Update V2Ray Configs

on:
  schedule:
    - cron: '0 */6 * * *'  # هر 6 ساعت
  workflow_dispatch:       # اجرای دستی
  push:
    branches: [ main ]
  watch:
    types: [ started ]     # وقتی کسی ستاره داد

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🚀 Run V2Ray Config Collector
      run: |
        python main.py
      env:
        PYTHONUNBUFFERED: 1
        
    - name: 📊 Display Collection Results
      run: |
        echo "=== نتایج جمع‌آوری ==="
        if [ -f "output/subscriptions/subscription_latest.txt" ]; then
          CONFIG_COUNT=$(wc -l < output/subscriptions/subscription_latest.txt)
          echo "✅ موفقیت آمیز! $CONFIG_COUNT کانفیگ یافت شد"
          echo "=== نمونه کانفیگ‌ها ==="
          head -3 output/subscriptions/subscription_latest.txt
        else
          echo "❌ فایل اشتراک ایجاد نشد"
          ls -la output/ || echo "پوشه خروجی وجود ندارد"
        fi
        
    - name: 💾 Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/
        
        if git diff --staged --quiet; then
          echo "📝 هیچ تغییری برای commit وجود ندارد"
        else
          git commit -m "🤖 Auto-update: $(date +'%Y-%m-%d %H:%M')"
          git push
          echo "✅ تغییرات commit و push شدند"
        fi
        
    - name: 🏷️ Create Release on Significant Update
      if: github.event_name == 'workflow_dispatch'
      run: |
        if [ -f "output/subscriptions/subscription_latest.txt" ]; then
          CONFIG_COUNT=$(wc -l < output/subscriptions/subscription_latest.txt)
          if [ $CONFIG_COUNT -gt 20 ]; then
            echo "🏷️ ایجاد تگ برای $CONFIG_COUNT کانفیگ"
            git tag -a "v$(date +'%Y.%m.%d.%H%M')" -m "انتشار با $CONFIG_COUNT کانفیگ"
            git push --tags
          fi
        fi
