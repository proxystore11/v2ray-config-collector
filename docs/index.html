<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>PRX11 – Premium CDN Panel</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Background Animation */
body {
  background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
  transition: background 0.6s ease;
}
body.light {
  background: radial-gradient(circle at center, #e5e7eb 0%, #f3f4f6 100%);
}

/* Glassmorphism */
.glass {
  backdrop-filter: blur(14px);
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.12);
  transition: all 0.5s ease;
}
body.light .glass {
  background: rgba(0, 0, 0, 0.06);
  border-color: rgba(0, 0, 0, 0.15);
}

/* PRX11 Logo Pulse */
.logo-pulse {
  animation: pulse 3s infinite;
}
@keyframes pulse {
  0% { opacity: .7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.07); }
  100% { opacity: .7; transform: scale(1); }
}

/* Neon Gradient Titles */
.title {
  background: linear-gradient(to right, #38bdf8, #818cf8, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>

</head>

<body class="text-white min-h-screen flex items-center justify-center p-6">

<!-- Theme Switch -->
<button id="themeToggle" class="fixed top-4 left-4 bg-white/20 px-4 py-2 rounded-xl glass text-sm">
  تغییر حالت Light/Dark
</button>

  <!-- LOGO -->
  <div class="flex justify-center mb-6">
    <svg width="120" height="120" viewBox="0 0 512 512" class="logo-pulse drop-shadow-xl">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#38bdf8"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="120" fill="url(#g)"/>
      <text x="50%" y="46%" text-anchor="middle" fill="#ffffff" font-size="130" font-weight="700">PRX</text>
      <text x="50%" y="65%" text-anchor="middle" fill="#e0e7ff" font-size="110" font-weight="700">11</text>
    </svg>
  </div>

  <h1 class="text-center text-3xl font-bold mb-2 title">PRX11 CDN Panel</h1>
  <p class="text-center opacity-80 mb-10">اشتراک‌های سریع و خودکار – نسخه پریمیوم</p>

  <div class="space-y-10">

    <!-- Shared Button Component -->
    <div>
      <a href="https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-hiddify.txt"
         class="block glass p-4 rounded-xl text-xl font-semibold text-center hover:bg-white/10 transition">
        🌀 اشتراک Hiddify (100 کانفیگ)
      </a>
      <p class="text-center mt-4">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&bgcolor=1E3A8A&color=FFFFFF&data=https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-hiddify.txt"
             class="mx-auto rounded-xl shadow-lg">
      </p>
    </div>

    <div>
      <a href="https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-insta-youto.txt"
         class="block glass p-4 rounded-xl text-xl font-semibold text-center hover:bg-white/10 transition">
        🎬 Instagram / Youtube Fragment
      </a>
      <p class="text-center mt-4">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&bgcolor=DB2777&color=FFFFFF&data=https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-insta-youto.txt"
             class="mx-auto rounded-xl shadow-lg">
      </p>
    </div>

             class="mx-auto rounded-xl shadow-lg">

    </div>

    <div>
      <a href="https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-vless.txt"
         class="block glass p-4 rounded-xl text-xl font-semibold text-center hover:bg-white/10 transition">
        🟩 VLESS

        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&bgcolor=065F46&color=FFFFFF&data=https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-vless.txt"
             class="mx-auto rounded-xl shadow-lg">
      </p>
    </div>

    <div>
      <a href="https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-trojan.txt"
         class="block glass p-4 rounded-xl text-xl font-semibold text-center hover:bg-white/10 transition">
        🔺 TROJAN
      </a>
      <p class="text-center mt-4">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&bgcolor=B91C1C&color=FFFFFF&data=https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-trojan.txt"
             class="mx-auto rounded-xl shadow-lg">
      </p>
    </div>

    <div>
      <a href="https://cdn.jsdelivr.net/gh/proxystore11/v2ray-config-collector/output/subscriptions/prx11-ss.txt"
         class="block glass p-4 rounded-xl text-xl font-semibold text-center hover:bg-white/10 transition">

             class="mx-auto rounded-xl shadow-lg">

  </div>

  <p class="text-center opacity-50 text-sm mt-12">
    PRX11 – Auto Updated via GitHub Actions
  </p>

</div>


<script>
document.getElementById("themeToggle").onclick = () => {
  document.body.classList.toggle("light");
};
</script>

</body>
</html>
