<!DOCTYPE html>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Particle Animation -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

/* macOS Blur + Noise */
body {
  background: #0f172a;
  background-size: cover;
  overflow-x: hidden;
}
body.light { background: #f5f5f5; }

.noise {
  position: fixed;
  inset: 0;
  opacity: .05;
  background: url('https://i.imgur.com/8gEpZB8.png');
  pointer-events: none;
}

/* Glass Panel */
.glass {
  backdrop-filter: blur(18px);
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.15);
  transition: .4s;
}
body.light .glass {
  background: rgba(0,0,0,.06);
}

/* PRX11 Logo Animation */
.logo-pulse {
  animation: pulse 3s infinite;
}
@keyframes pulse {
  0% { transform: scale(1); opacity: .7; }
  50% { transform: scale(1.07); opacity: 1; }
  100% { transform: scale(1); opacity: .7; }
}

/* 3D Buttons */
.btn-3d {
  position: relative;
  transition: all .25s ease;
  transform-style: preserve-3d;
}
.btn-3d:active {
  transform: translateY(3px) scale(.96);
}

/* Wave Hover Animation */
.wave:hover {
  box-shadow: 0 0 25px rgba(255,255,255,0.35);
  transform: translateY(-4px);
}

/* Multi Themes */
.theme-green { background: linear-gradient(135deg,#16a34a,#4ade80); }
.theme-purple { background: linear-gradient(135deg,#7c3aed,#a78bfa); }
.theme-red { background: linear-gradient(135deg,#dc2626,#fb7185); }
.theme-ocean { background: linear-gradient(135deg,#0284c7,#22d3ee); }

</style>
</head>

<div class="noise"></div>

<!-- Theme Script -->
<script>
function setTheme(color) {
  document.querySelectorAll('.glass').forEach(e=>{
    e.style.borderColor="rgba(255,255,255,0.2)";
  });
  switch(color){
    case 'green': document.body.style.background = "linear-gradient(135deg,#064e3b,#064e3b)"; break;
    case 'purple': document.body.style.background = "linear-gradient(135deg,#3b0764,#1e1b4b)"; break;
    case 'red': document.body.style.background = "linear-gradient(135deg,#450a0a,#7f1d1d)"; break;
    case 'ocean': document.body.style.background = "linear-gradient(135deg,#0c4a6e,#0e7490)"; break;
  }
}

function toggleMode(){
  document.body.classList.toggle("light");
}
</script>

<!-- Particle Animation Init -->
<script>
particlesJS("particles-js",{
  "particles":{
    "number":{"value":80,"density":{"enable":true,"value_area":900}},
    "color":{"value":"#ffffff"},
    "shape":{"type":"circle"},
    "opacity":{"value":0.5,"random":true},
    "size":{"value":3,"random":true},
    "line_linked":{"enable":false},
    "move":{"speed":1,"direction":"none","out_mode":"out"}
  },
  "interactivity":{
    "events":{"onhover":{"enable":true,"mode":"bubble"}},
    "modes":{"bubble":{"distance":200,"size":6}}
  },
  "retina_detect":true
});
</script>
